name: Phase 5 verification

on:
  push:
    branches: [main]
  pull_request:

jobs:
  full-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v6
        with:
          version: 0.11.28
      - run: uv sync --frozen --extra model --extra modal --group dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @inheritbench/web exec playwright install --with-deps chromium
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest -m "not model_smoke and not modal"
      - run: uv run inheritbench data generate --config configs/tasks/opsroute.yaml --output data/opsroute/v0.1.0 --check
      - run: uv run inheritbench phase5 verify-web-projection
      - run: pnpm verify:web

  node-only-static-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @inheritbench/web build
